name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "subsleuth-pages/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Pages bundle
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          test -f subsleuth-pages/index.html
          test -f subsleuth-pages/subsleuth.css
          test -f subsleuth-pages/subsleuth.js
          test -f subsleuth-pages/.nojekyll
          node --check subsleuth-pages/subsleuth.js
          pytest tests/ -q

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: subsleuth-pages
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
