name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate browser bundle
        run: |
          test -f subsleuth-pages/.nojekyll
          test -f subsleuth-pages/subsleuth.css
          node --check subsleuth-pages/subsleuth.js
          python -m pytest tests/test_browser_assets.py -q

      - name: Run tests
        run: pytest -q
